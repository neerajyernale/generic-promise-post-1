<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User managemt Stystem</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
        crossorigin="anonymous"
    />

    <link rel="stylesheet" href="assets/style.css" >
</head>
<body>
    <div class="text-center">
  <header class="d-flex justify-content-center align-items-center mb-2">
    <i class="fa-solid fa-users text-muted"></i>
    <h1 class="ml-3 text-muted">User Data Dashboard</h1>
  </header>
  <strong>User can add and remove data efficiently from the database</strong>
</div>
<div class="container  ">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card  ">
                    <div class="card-header d-flex align-items-center">
                        <i class="fa-solid fa-user-plus text-secondary"></i>
                        <h1 class="ml-3">Add/Update user</h1>
                    </div>
                    <div class="card-body">
                        <form action="" id="postForm">
                            <div class="form-group">
                                <label for="title"> Title*</label>
                                <input type="text" class="form-control rounded" id="title" required placeholder="Enter title">
                            </div>
                             <div class="form-group">
                                <label for="title">Body*</label>
                                <textarea type="text" class="form-control rounded" id="body" required placeholder="Enter Description"
                                rows="4"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="Users">Select Users*</label>
                                <select id="users" class="form-control">
                                    <option value="1">User 1</option>
                                    <option value="2">User 2</option>
                                    <option value="3">User 3</option>
                                    <option value="4">User 4</option>
                                    <option value="5">User 5</option>
                                    <option value="6">User 6</option>
                                    <option value="7">User 7</option>
                                    <option value="8">User 8</option>
                                    <option value="9">User 9</option>
                                    <option value="10">User 10</option>

                                </select>
                            </div>
                            <div class="card-footer">
                                <button class="btn btn-outline-primary btn-block" id="addBtn"  >
                                    <i class="fa-solid fa-user-plus"></i>
                                    Add User
                                </button>
                                <button class="btn btn-outline-warning btn-block d-none" id="updateBtn" type="button"  >
                                    <i class="fa-solid fa-user-plus"></i>
                                    Update User
                                </button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
            <div class="col-md-12 mt-5 mx-auto">
                <div class="card ">
                    <div class="card-header d-flex align-items-center">
                        <i class="fa-solid fa-users text-warning"></i>
                        <h2 class="ml-3">All User Data</h2>
                    </div>
                    <div class="card-body">
                        <div class="row" id="userContainer">

                        </div>
                    </div>
                </div>
            </div>

        </div>
    
</div>
<div class="spinner d-none" id="spinner">
           <div class="spinner-border text-danger" role="status"></div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="assets/app.js"></script> 
</body>
</html>
